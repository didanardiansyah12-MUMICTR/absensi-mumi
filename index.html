button.btn{padding:10px 16px;border-radius:9px;border:1px solid var(--accent);background:var(--accent);color:#fff;font-size:13.5px;font-weight:600;cursor:pointer;}
button.btn.ghost{background:#fff;color:var(--accent-dark);}button.btn.danger{background:var(--bad);border-color:var(--bad);}
select,input,textarea{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:9px;font-size:14px;background:#fff;color:var(--ink);margin-bottom:8px;}
.statgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:10px;margin-top:10px;}
.stat{background:var(--gray-soft);border-radius:10px;padding:10px 12px;}.stat .num{font-size:22px;font-weight:700;line-height:1.1;}.stat .lbl{font-size:11.5px;color:var(--ink-soft);margin-top:2px;}
.stat.hadir{background:var(--accent-soft);}.stat.hadir .num{color:var(--accent-dark);}
.hint{font-size:12px;color:var(--ink-soft);background:var(--gray-soft);border-radius:9px;padding:10px 12px;margin-top:10px;}
.success-msg{background:var(--accent-soft);border:1px solid var(--accent);border-radius:10px;padding:12px 14px;color:var(--accent-dark);font-size:13px;margin-bottom:12px;display:none;}.success-msg.show{display:block;}
#gate{position:fixed;inset:0;background:var(--accent-dark);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;}
#gate .box{background:#fff;border-radius:16px;padding:26px 24px;max-width:340px;width:100%;text-align:center;}
#gate .box h2{margin:0 0 4px;font-size:17px;color:var(--ink);} #gate input{margin-bottom:10px;text-align:center;letter-spacing:2px;}
.struktur-box{background:var(--accent-soft);border-radius:10px;padding:12px;margin-bottom:10px;border-left:4px solid var(--accent);}
.struktur-box h3{margin:0 0 10px;color:var(--accent-dark);font-size:14px;font-weight:700;}
.form-group{margin-bottom:10px;}.form-group label{display:block;font-size:12px;font-weight:600;margin-bottom:4px;color:var(--ink);}

.badge{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;white-space:nowrap;}

#reader{width:100%;max-width:420px;margin:0 auto;border-radius:12px;overflow:hidden;}
@media print{header,nav,.noprint{display:none!important;}body{background:#fff;padding:0;} main{max-width:100%;padding:0;}.card{border:none;padding:0;}}

function renderPengurusDesa(){

  Object.entries(PENGURUS_DESA).forEach(([jabatan,data])=>{

  });
  html+='</div>';
  document.getElementById('pengurusDesa').innerHTML=html;
}

function renderStrukturKelompok(){
  let html='';
  KELOMPOK.forEach(k=>{
    const data=DB.struktur[k]||{};
    html+=`<div class="struktur-box"><h3>${k}</h3>`;
    JABATAN.forEach(j=>{
      html+=`<div class="form-group">
        <label>${j}:</label>
        <input type="text" id="struktur-${k}-${j}" value="${data[j]||''}" placeholder="Nama pengurus">
      </div>`;
    });
    html+=`</div>`;
  });
  html+=`<button class="btn" onclick="saveStrukturKelompok()" style="width:100%;">💾 Simpan Semua Struktur</button>`;
  document.getElementById('strukturContent').innerHTML=html;
}

function saveStrukturKelompok(){
  const struktur={};
  KELOMPOK.forEach(k=>{
    struktur[k]={};
    JABATAN.forEach(j=>{
      const val=document.getElementById(`struktur-${k}-${j}`).value.trim();
      if(val) struktur[k][j]=val;
    });
  });
  DB.struktur=struktur;
  saveDB();
  const msg=document.getElementById('successStrukt');
  msg.innerHTML='✅ Struktur pengurus berhasil disimpan!';
  msg.classList.add('show');
  setTimeout(()=>msg.classList.remove('show'),3000);
}

function setupDesaSession(){
  document.getElementById('btnDesaStart').onclick=()=>{
    const tgl=document.getElementById('desaTanggal').value;
    const nm=document.getElementById('desaNama').value||'Pengajian Desa';
    
    if(!DB.desa) DB.desa={};
    if(!DB.desa[tgl]) DB.desa[tgl]={nama:nm,aktif:true,records:{}};
    else DB.desa[tgl].aktif=true;
    
    DB.desa[tgl].nama=nm;
    saveDB();
    
    document.getElementById('btnDesaStart').style.display='none';
    document.getElementById('btnDesaReset').style.display='block';
    
    const status=document.getElementById('desaStatus');
    status.innerHTML=`<div style="background:var(--accent-soft);border-radius:10px;padding:12px;color:var(--accent-dark);">✅ <b>SESI AKTIF:</b> ${nm} - ${tgl}</div>`;
    
    document.getElementById('desaContent').innerHTML=`
      <div style="margin-top:12px;">
        <p style="color:var(--ink-soft);font-size:12px;">Fitur scan absensi akan ditambahkan di update berikutnya. Untuk sekarang, struktur & admin sudah ready!</p>
      </div>`;
  };
  
  document.getElementById('btnDesaReset').onclick=()=>{
    if(!confirm('Reset sesi hari ini? (untuk test atau jika ternyata libur)')) return;
    
    const tgl=document.getElementById('desaTanggal').value;
    if(DB.desa && DB.desa[tgl]) {
      DB.desa[tgl].aktif=false;
      DB.desa[tgl].records={};
    }
    saveDB();
    
    alert('✅ Sesi di-reset. Bisa mulai ulang lagi.');
    location.reload();
  };
}

function setupAdmin(){
  document.getElementById('btnTestSheet').onclick=()=>{
    const url=document.getElementById('sheetUrl').value.trim();
    if(!url){alert('Paste URL terlebih dahulu!');return;}
    
    fetch(url,{method:'POST',body:JSON.stringify({action:'getAbsensi'})})
      .then(r=>r.json())
      .then(data=>{
        if(data.success){
          alert('✅ Google Sheets Connected!');
          localStorage.setItem('mumi_sheet_url',url);
        }else{
          alert('❌ Connection failed');
        }
      }).catch(err=>alert('❌ '+err.message));
  };
  
  document.getElementById('btnExport').onclick=()=>{
    const data={roster:ROSTER, db:DB, timestamp:new Date().toISOString()};
    const json=JSON.stringify(data,null,2);
    const blob=new Blob([json],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download='mumi-backup-'+todayStr()+'.json';
    a.click();
  };
  
  document.getElementById('btnLogout').onclick=()=>{
    sessionStorage.removeItem(GATE_KEY);
    location.reload();
  };
  
  const savedUrl=localStorage.getItem('mumi_sheet_url');
  if(savedUrl) document.getElementById('sheetUrl').value=savedUrl;
}

</script>
